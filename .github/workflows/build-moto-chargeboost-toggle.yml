name: Build MotoChargeBoostToggle APK

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release and upload APK'
        required: false
        default: false
        type: boolean
  push:
    paths:
      - 'projects/moto-chargeboost-toggle/**'
      - '.github/workflows/build-moto-chargeboost-toggle.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: projects/moto-chargeboost-toggle
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare project for CI
        run: |
          rm -f local.properties
          sed -i '/^android\.aapt2FromMavenOverride=/d' gradle.properties || true
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f app/build.gradle.kts

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: moto-chargeboost-toggle-debug-apk
          path: projects/moto-chargeboost-toggle/app/build/outputs/apk/debug/*.apk

      - name: Generate release metadata
        if: github.event_name == 'workflow_dispatch' && inputs.release
        run: |
          echo "RELEASE_TAG=moto-chargeboost-toggle-$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: MotoChargeBoostToggle ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: projects/moto-chargeboost-toggle/app/build/outputs/apk/debug/*.apk

      - name: Prune old releases (keep latest 8)
        if: github.event_name == 'workflow_dispatch' && inputs.release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const realReleases = releases
              .filter(r => !r.draft && !r.prerelease)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = realReleases.slice(8);
            for (const rel of toDelete) {
              if (rel.tag_name) {
                core.info(`Deleting release ${rel.id} tag ${rel.tag_name}`);
                await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id });
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${rel.tag_name}` });
              }
            }
